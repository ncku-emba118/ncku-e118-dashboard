<style>
:root{
  --wine:#8B1F2F; --wine-deep:#6B1622; --wine-soft:#A84453;
  --gold:#C9A961; --gold-soft:#E0C896; --gold-deep:#A8853C;
  --cream:#FAF7F2; --paper:#F4EFE6; --ivory:#EDE6D6;
  --ink:#1A1612; --ink-soft:#4A413A; --mute:#8A7F73; --line:#D9CDB8;
  --rule:rgba(26,22,18,.10);
  --fd:'Cormorant Garamond','Iowan Old Style',Georgia,serif;
  --ftc:'Noto Serif TC','PingFang TC','Songti TC',serif;
  --fb:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'PingFang TC','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at 0% 0%,rgba(201,169,97,.05) 0%,transparent 55%),
    radial-gradient(circle at 100% 100%,rgba(139,31,47,.04) 0%,transparent 50%),
    var(--cream);
  color:var(--ink); font:15px/1.65 var(--fb);
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 32px}

.back{display:inline-flex;align-items:center;gap:6px;margin:22px 0 0;
  font:600 13px var(--fb);color:var(--wine);text-decoration:none;letter-spacing:.02em;
  padding:7px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;transition:.16s}
.back:hover{border-color:var(--gold);background:var(--paper)}

.mast{padding:22px 0 26px;border-bottom:2px solid var(--wine);position:relative;margin-top:18px}
.mast::after{content:'';position:absolute;left:0;right:0;bottom:-5px;height:1px;background:var(--gold)}
.kicker{font:600 11px var(--fb);letter-spacing:.34em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
.mast h1{font:700 38px/1.05 var(--ftc);color:var(--wine);letter-spacing:.01em}
.mast .en{font:500 14px var(--fd);letter-spacing:.22em;text-transform:uppercase;color:var(--mute);margin-top:8px}
.mast .lead{margin-top:14px;max-width:660px;color:var(--ink-soft);font-size:14px}

.pii{margin:18px 0 0;display:flex;gap:10px;align-items:flex-start;
  background:rgba(139,31,47,.05);border:1px solid var(--rule);border-left:3px solid var(--gold);
  padding:11px 15px;border-radius:8px;font-size:12.5px;color:var(--ink-soft);max-width:760px}
.pii b{color:var(--wine)}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding:24px 0 6px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{appearance:none;border:1px solid var(--line);background:transparent;color:var(--ink-soft);
  font:500 12.5px var(--fb);padding:6px 13px;border-radius:999px;cursor:pointer;transition:.16s}
.chip:hover{border-color:var(--gold)}
.chip.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.c-ball{background:#8B1F2F}.c-out{background:#3E6B4F}.c-art{background:#A8853C}.c-edu{background:#3A5A7A}
.count{font:600 13px var(--fd);letter-spacing:.12em;color:var(--mute)}
.count b{color:var(--wine);font-size:18px}

.stage{padding:22px 0 80px}
.ic{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.own{display:inline-flex;align-items:center;gap:4px;background:var(--gold);color:var(--wine-deep);
  font:700 10px var(--fb);letter-spacing:.08em;padding:2px 7px;border-radius:5px;vertical-align:middle}
.t-ball{background:#8B1F2F}.t-out{background:#3E6B4F}.t-art{background:#A8853C}.t-edu{background:#3A5A7A}

/* gallery */
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 18px 18px;
  cursor:pointer;position:relative;transition:.2s;overflow:hidden}
.card::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--wine),var(--gold))}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 34px -16px rgba(107,22,34,.4);border-color:var(--gold)}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.iconw{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--wine),var(--wine-deep));color:var(--gold-soft)}
.iconw .ic{width:24px;height:24px;stroke-width:1.5}
.ybadge{text-align:right}
.ybadge .a{font:500 10px var(--fd);letter-spacing:.12em;color:var(--mute)}
.ybadge .r{font:700 17px var(--ftc);color:var(--wine);line-height:1.1}
.card h3{font:600 19px var(--ftc);color:var(--ink);margin-bottom:7px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.card .ctag{font:600 10px var(--fb);letter-spacing:.05em;padding:2px 8px;border-radius:5px;color:#fff;display:inline-block;margin-bottom:9px}
.card .ci{font-size:12.5px;color:var(--ink-soft);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px}
.card .meta{margin-top:13px;padding-top:11px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;font-size:11.5px;color:var(--mute);transition:opacity .18s}
.card .meta b{color:var(--wine-soft);font-weight:600}
.card .more{position:absolute;right:18px;bottom:16px;font:600 12px var(--fb);color:var(--gold-deep);opacity:0;transition:opacity .18s;pointer-events:none}
.card:hover .meta{opacity:0}
.card:hover .more{opacity:1}

/* modal */
.ov{position:fixed;inset:0;background:rgba(26,22,18,.55);backdrop-filter:blur(3px);display:none;place-items:center;z-index:90;padding:24px}
.ov.show{display:grid}
.modal{background:var(--cream);max-width:560px;width:100%;max-height:86vh;overflow:auto;border-radius:18px;border:1px solid var(--gold);box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.modal .mh{background:linear-gradient(135deg,var(--wine),var(--wine-deep));color:#fff;padding:26px 26px 22px;position:relative}
.modal .mh .micon{width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.12);display:grid;place-items:center;color:var(--gold-soft);margin-bottom:14px}
.modal .mh .micon .ic{width:28px;height:28px}
.modal .mh h2{font:700 26px var(--ftc);letter-spacing:.01em}
.modal .mh .sub{margin-top:6px;font:500 12px var(--fb);color:var(--gold-soft);letter-spacing:.08em}
.modal .x{position:absolute;top:18px;right:20px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:18px;cursor:pointer;line-height:1}
.modal .mb{padding:22px 26px 28px}
.modal .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;margin-bottom:8px}
.modal .gi .k{font:600 10.5px var(--fb);letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:3px}
.modal .gi .v{font-size:13.5px;color:var(--ink)}
.modal .sec{margin-top:16px}
.modal .sec h4{font:600 13px var(--ftc);color:var(--wine);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.modal .sec h4::before{content:'';width:14px;height:2px;background:var(--gold)}
.modal .sec p{font-size:13px;color:var(--ink-soft);line-height:1.75}

.foot{border-top:1px solid var(--rule);padding:22px 0 40px;color:var(--mute);font-size:12px}
.foot b{color:var(--wine-soft)}

@media(max-width:560px){
  .wrap{padding:0 18px}
  .mast h1{font-size:29px}
  .modal .grid{grid-template-columns:1fr}
}
</style>

{n:'海洋運動社',ad:2024,cat:'out',ic:'waves',pres:'E112 蘇敬舜',mgr:'E117 王修凡',time:'每月 1 次（時間不定）',place:'地點不定',fee:'首次入社費 1,000＋社費 5,000，次年起僅社費',mem:'不限',intro:'將海洋運動與 MBA 課程結合，規劃帆船、潛水、衝浪、SUP 等活動，於團隊合作中學習領導、溝通與應變，全方位提升自我。',ann:'自由潛水／衝浪／SUP 體驗、國內外帆船賽事、國際帆船認證班、跳島旅遊'},
{n:'匹克球社',ad:2026,cat:'ball',ic:'target',pres:'E118 卓彤穎',mgr:'—',time:'每週二 19:00–21:00',place:'羽潮匹克球館—永康勁拍館',fee:'年費 3,000；零打 200',mem:'120 人',intro:'成大 EMBA 第 1 屆匹克球社（2026 創立）。結合網球、羽球與桌球特色，趣味、運動與策略兼具，老少咸宜易上手。',ann:'跨校 EMBA 友誼賽、各地賽事、全國 EMBA 匹克球邀請賽'}
];

const $=s=>document.querySelector(s);
const svg=(ic,sz)=>`<svg class="ic" width="${sz}" height="${sz}" viewBox="0 0 24 24">${ICONS[ic]}</svg>`;
const isOwn=c=>c.pres.startsWith('E118')||c.mgr.startsWith('E118');
const ownBadge=c=>isOwn(c)?'<span class="own">★ E118 本班</span>':'';
let cat='all';
const filtered=()=>cat==='all'?CLUBS:CLUBS.filter(c=>c.cat===cat);

const chipDefs=[['all','全部','']].concat(Object.entries(CATS).map(([k,v])=>[k,v.label,v.cls]));
$('#chips').innerHTML=chipDefs.map(([k,l,c])=>`<button class="chip ${k==='all'?'on':''}" data-c="${k}">${c?`<span class="dot c-${c}"></span>`:''}${l}</button>`).join('');

function render(){
  const d=filtered(); $('#cnt').textContent=d.length;
  $('#gal').innerHTML=d.map(c=>{const i=CLUBS.indexOf(c);return `
   <div class="card" data-open="${i}">
     <div class="top"><div class="iconw">${svg(c.ic,24)}</div>
       <div class="ybadge"><div class="a">EST.</div><div class="r">${c.ad}</div></div></div>
     <h3>${c.n} ${ownBadge(c)}</h3>
     <span class="ctag t-${CATS[c.cat].cls}">${CATS[c.cat].label}</span>
     <div class="ci">${c.intro}</div>
     <div class="meta"><span>例會 <b>${c.time==='—'?'不定期':c.time.split('、')[0]}</b></span><span>社員 <b>${c.mem}</b></span></div>
     <span class="more">詳情 ›</span>
   </div>`;}).join('');
}
function openModal(i){const c=CLUBS[i];
  $('#modal').innerHTML=`
   <div class="mh"><div class="micon">${svg(c.ic,28)}</div><button class="x" aria-label="關閉">×</button>
     <h2>${c.n} ${ownBadge(c)}</h2><div class="sub">${CATS[c.cat].label} · 成立於 ${c.ad}</div></div>
   <div class="mb">
     <div class="grid">
       <div class="gi"><div class="k">社長</div><div class="v">${c.pres}</div></div>
       <div class="gi"><div class="k">總幹事</div><div class="v">${c.mgr}</div></div>
       <div class="gi"><div class="k">例會時間</div><div class="v">${c.time}</div></div>
       <div class="gi"><div class="k">例會地點</div><div class="v">${c.place}</div></div>
       <div class="gi"><div class="k">社費</div><div class="v">${c.fee}</div></div>
       <div class="gi"><div class="k">社員人數</div><div class="v">${c.mem}</div></div>
     </div>
     <div class="sec"><h4>社團簡介</h4><p>${c.intro}</p></div>
     <div class="sec"><h4>年度活動</h4><p>${c.ann}</p></div>
   </div>`;
  $('#ov').classList.add('show');
}
document.addEventListener('click',e=>{
  const ch=e.target.closest('.chip'); if(ch){cat=ch.dataset.c;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('on',b.dataset.c===cat));render();return;}
  const cd=e.target.closest('[data-open]'); if(cd){openModal(+cd.dataset.open);return;}
  if(e.target.closest('.x')||e.target.id==='ov'){$('#ov').classList.remove('show');}
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#ov').classList.remove('show');});
render();
</script>
</body>
</html>
