# Netlify build + plugin configuration for E118 dashboard (Next.js 15)
# 主 dashboard 升級為 Next.js 後、Netlify 從純靜態網站切到 SSR + API routes。
#
# 部署架構：
#   • main branch push → 觸發 build
#   • npm run build → next build 產出 .next/
#   • @netlify/plugin-nextjs → 自動把 SSR / API routes 包成 Netlify Functions
#   • 既有靜態頁面 (/、/calendar) 用 Next.js SSG export 仍是純靜態 HTML，效能不變
#   • /board/* + /api/board/* 走 dynamic SSR + Function

[build]
  command = "npm run build"
  # 必須明示 publish；@netlify/plugin-nextjs 之後會自己覆寫處理，
  # 但 toml 不寫的話 Netlify 把 publish 當 base (/) → "publish 不能跟 base 相同" 錯
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 學分追蹤已獨立成 credits.e118.aqualux.dev（單一來源）。
# 舊內嵌 /credits 一律強制 301 轉過去；force=true 才能蓋過 public/ 靜態檔
# （public/credits/ 已刪除，這裡再加一層保險，舊書籤也會被帶到新站）。
[[redirects]]
  from = "/credits"
  to = "https://credits.e118.aqualux.dev"
  status = 301
  force = true

[[redirects]]
  from = "/credits/*"
  to = "https://credits.e118.aqualux.dev/:splat"
  status = 301
  force = true

# Scheduled function: 每分鐘 ping /api/board/push/dispatch、處理 stale push_jobs
# 對應 ARCHITECTURE.md v3 第 7 章 outbox worker
# 實際 cron 在 netlify/functions/push-cron.mts 內 export const config = { schedule }

# ── Function 區域 / 逾時（無法用 netlify.toml 設定，已改用 Netlify API）──────────
#  ⚠ functions_region / functions_timeout 不是合法的 [functions] toml key
#    （[functions] timeout=N 會被當成「名為 timeout 的 function 設定」而報錯）。
#  正式設定（透過 `netlify api updateSite`，存在 site config、非 repo）：
#    • functions_region = "ap-southeast-1"（新加坡）
#        ↳ 與 Supabase 專案同區。簽核 PDF 必須 subset:false 內嵌完整中文字型 ≈4.8MB，
#          原本 function 在 us-east-2，跨太平洋上傳要 6-9s 偶發逾時 abort；
#          同區後上傳 <1s。改區域要重新部署才生效（function 在 deploy 時 pin 區域）。
#    • functions_timeout = 26（Pro 上限，預設 10s）→ 給慢上傳 + retry 餘裕。
#  另見 lib/signoff/retry.ts（上傳暫時性錯誤重試）。
